# ============================================================
#  KI-Podcast – zentrale Konfiguration
#  Alles Anpassbare an einem Ort. Keine Secrets hier rein!
#  (Der OpenAI-Key kommt aus der Umgebungsvariable OPENAI_API_KEY)
# ============================================================

podcast:
  title: "KI Update – Der KI-Podcast"
  subtitle: "Zweimal die Woche die KI-Tools, Trends und Anwendungen, die gerade zählen – kompakt und praxisnah."
  description: >
    Zweimal pro Woche (Dienstag & Freitag) ein kompakter Überblick über die
    KI-Welt: neue Tools, virale Projekte, praktische Anwendungsfälle und wo du
    sie im Job und privat einsetzt. Mehr Breite, klare Einordnung zum Mitreden
    und Entscheiden – ohne Forschungstiefe. Vollautomatisch generiert.
  author: "KI Update"
  owner_email: "zloanthepriest@gmx.de"
  language: "de"
  category: "Technology"
  explicit: false

  # WICHTIG: Öffentliche Basis-URL, unter der die Dateien liegen.
  # Bei GitHub Pages: https://<dein-user>.github.io/<repo-name>
  # (Ohne Slash am Ende.) Wird für RSS-Feed & Audio-Links gebraucht.
  base_url: "https://ejayscream.github.io/Podcast"

  # Pfad zum Cover (Apple verlangt 1400x1400 – 3000x3000 px, quadratisch, JPG/PNG)
  cover_image: "assets/cover.png"

# ---- Inhaltliche Steuerung ----
content:
  language_style: "Deutsch, Fachbegriffe (z.B. context window, RAG, fine-tuning) im englischen Original belassen"
  target_minutes: 13          # Ziellänge der Folge (Breite statt Tiefe)
  max_minutes: 15             # harte Obergrenze – Skript darf das NIE überschreiten
  words_per_minute: 150       # Sprechtempo-Annahme für Längenberechnung
  topics_per_episode: 6       # Anzahl Themen pro Folge (mehr Breite, weniger Tiefe je Thema)
  # 2×/Woche (Di & Fr): darum weniger Tiefe je Thema, dafür mehr Themen.
  avoid_recent_episodes: 6    # Themen der letzten N Folgen NICHT wiederholen
  audience: >
    Erfahrener IT-Profi: IT-Systemadministrator, IT-Lead und KI-Consultant.
    KEIN Programmierer oder Modellentwickler und will es nicht werden – bleibt
    Anwender und Implementierer. Ziel: am Zahn der Zeit sein, um zu erkennen,
    WO sich neue KI-Tools und -Projekte sinnvoll integrieren lassen – im Beruf
    (IT-Betrieb, Beratung, Team, Automatisierung) UND privat. Braucht solide
    Einordnung (genug, um mitzureden und fundiert zu entscheiden), aber KEINE
    Forschungs-, Mathematik- oder Coding-Tiefe. Interessiert an: konkreten
    Anwendungsfällen, echtem Impact, neuen Tools, Workflows und Integration.

# ---- OpenAI-Modelle (IDs ggf. an deinen Account anpassen) ----
openai:
  research_model: "gpt-5.6-terra"  # Alltags-Wissensarbeit; ~halbe Kosten von Sol, praktisch gleiche Qualität hier
  writer_model: "gpt-5.6-terra"    # Skript-Schreiben (Fließtext) – Terra reicht klar, s. Benchmark-Check 2026-07-12
  tts_model: "gpt-4o-mini-tts"     # Text-to-Speech-Modell
  tts_voice: "coral"               # freundliche, warme weibliche Stimme (Alt.: nova, shimmer, sage)
  tts_instructions: >
    Sprich wie ein ruhiger, kompetenter deutscher Tech-Host am Morgen:
    klar, wach, natürlich, mit sinnvollen Pausen. Nicht hektisch, nicht künstlich.

# ---- Themenquellen (Feeds als Seed für die Recherche) ----
sources:
  max_seed_items: 25          # so viele Feed-Einträge maximal ins Research geben
  feeds:
    - name: "Hacker News (AI-Tools, viel diskutiert)"
      url: "https://hnrss.org/newest?q=AI+OR+LLM+OR+ChatGPT+OR+Claude+OR+agent+OR+copilot&points=100"
    - name: "TechCrunch AI"
      url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    - name: "VentureBeat AI"
      url: "https://venturebeat.com/category/ai/feed/"
    - name: "Ars Technica AI"
      url: "https://arstechnica.com/ai/feed/"
    - name: "Product Hunt (neue Tools)"
      url: "https://www.producthunt.com/feed"
    # Hinweis: tldr.tech & GitHub Trending haben keinen stabilen RSS –
    # die werden im Recherche-Schritt gezielt per Web-Suche einbezogen.

# ---- Archiv / Aufräumen ----
archive:
  keep_last_episodes: 60      # ältere MP3s aus dem Repo entfernen (Feed bleibt schlank)
